# Version de docker-compose (compatible avec Docker desktop récent)
version: '3.8'

# Services = conteneurs qui vont tourner
services:
  # ===== Service Base de Données =====
  db:
    # Utiliser l'image MySQL officielle version 8.0
    image: mysql:8.0
    
    # Redémarrer auto le conteneur en cas de crash
    restart: always
    
    # Variables d'environnement pour configurer MySQL
    environment:
      # Nom de la base de données à créer
      MYSQL_DATABASE: diplomaverif_db
      # Mot de passe du root de MySQL
      MYSQL_ROOT_PASSWORD: 
      # Utilisateur de l'app pour accéder à la DB
      MYSQL_USER: root
      # Mot de passe de l'utilisateur app
      MYSQL_PASSWORD: 
    
    # Mapper le port MySQL: conteneur:hôte
    # Permet d'accéder à MySQL depuis l'hôte sur localhost:3306
    ports:
      - "3306:3306"
    
    # Volume = dossier persistant pour que les données ne se perdent pas au redémarrage
    # mysql_data = volume Docker (créé auto, géré par Docker)
    volumes:
      - mysql_data:/var/lib/mysql

  # ===== Service API Node.js =====
  api:
    # Construire l'image à partir du Dockerfile du projet
    build: .
    
    # Redémarrer auto en cas de crash
    restart: always
    
    # Mapper le port: conteneur:hôte
    # L'app écoute sur 3000, accessible sur localhost:3000
    ports:
      - "3000:3000"
    
    # Variables d'environnement pour le code Node.js
    environment:
      # String de connexion à MySQL
      # Format: mysql://user:password@host:port/database
      # 'db' = nom du service MySQL ci-dessus (Docker DNS permet la résolution)
      DATABASE_URL: "mysql://app_user:app_password_secure@db:3306/diplomaverif_db"
      # Optional: NODE_ENV pour indiquer qu'on est en prod
      NODE_ENV: production
    
    # Dépendances: attendre que 'db' soit prêt avant de lancer 'api'
    depends_on:
      - db
    
    # Volumes = dossiers partagés entre hôte et conteneur
    # Utile pour les uploads/fichiers
    volumes:
      # .:/app = tout le projet local dans /app du conteneur
      - .:/app
      # /app/node_modules = volume local pour éviter les conflits
      - /app/node_modules

# ===== Volumes Nommés =====
# mysql_data: stocke les données MySQL de façon persistante
# Éliminé avec: docker volume rm mysql_data (ou docker compose down -v)
volumes:
  mysql_data:
    driver: local